server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    location /api/ {
        #proxy_pass http://backend:5000/api/;
        proxy_pass https://tms-backend-group10.azurewebsites.net/api/;
        proxy_http_version 1.1;
        #proxy_set_header Host $host;
        proxy_set_header Host tms-backend-group10.azurewebsites.net;
        proxy_set_header X-Real-IP $remote_addr;
        #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;#azure ssl support
    }

    # Proxy Socket.IO to the backend container
    location /socket.io/ {
        #proxy_pass http://backend:5000/socket.io/;
        proxy_pass https://tms-backend-group10.azurewebsites.net/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        #proxy_set_header Host $host;
        proxy_set_header Host tms-backend-group10.azurewebsites.net;#azure ssl support
        proxy_ssl_server_name on;#azure ssl support
    }

    # React Router support
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}