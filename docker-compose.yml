services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: tms_db
    ports:
      - "3308:3306"
    volumes:
      - tms_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: "1234"
      DB_NAME: tms_db
      DB_PORT: 3306
      PORT: 5000
      JWT_SECRET: 973b338d11923d246c2ddefe9c5503271c8f036a54adc2ac7b3682f47a721aa3
      EMAIL_USER: testdilum45@gmail.com
      EMAIL_PASS: bmqy nllb wufa hbvu
      FRONTEND_URL: http://localhost
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tms_mysql_data: